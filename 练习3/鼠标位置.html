<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box1 {
            width: 500px;
            height: 500px;
            background-color: aqua;
            position: relative;
        }

        #box2 {
            width: 50px;
            height: 50px;
            background-color: rgb(184, 51, 27);
            position: absolute;
            top:50%;
            margin-top: -25px;
        }
    </style>
</head>

<body>
    <div id="box1">
        <p></p>
    </div>
    <div id="box2"></div>
    <script>
        var a = document.getElementById('box1');
        var b = document.getElementById('box2');
        a.onmousemove = function (e) {
            a.innerHTML=(e.offsetX + ',' + e.offsetY)
        }
    </script>
</body>

</html>
