<body>
    <script>

        let url = 'https://www.imooc.com/course/list';
        const add = (url, name, value) => {
            url += url.includes('?') ? '&' : '?';
           url += `${name}=${value}`;
            return url;
        }
        url = add(url, 'c', 'fe');
        console.log(url);
    </script>
</body>
