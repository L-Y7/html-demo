<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box {
            background-color: aqua;
            width: 100px;
            height: 100px;
            position: absolute;
            top: 0;
            left: 0;

        }
    </style>
</head>

<body>
    <div id="box"></div>
    <script>
        var pos = 1;
        var a = document.getElementsByTagName('div')[0];
       console.log(a);
        var lock = true;

        function b() {
            a.style.transition = 'all 2s linear 0s';
            if (!lock) {
                return;
            }
            if (pos == 1) {
                a.style.left = "1000px";
                pos = 2;
            }
            else if (pos == 2) {
                a.style.left = "0px";
                pos = 1;
            }

            lock = false;
            setTimeout(function () {
                lock = true;
            }, 2000);
            
        }
        setInterval(b,2000);
    </script>
</body>

</html>
