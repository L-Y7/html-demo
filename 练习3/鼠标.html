<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box {
            width: 500px;
            height: 500px;
            background-color: aqua;
        }
    </style>
</head>

<body>
    <div id="box">0</div>
    <script>
        var a = document.getElementById('box');
        var b = 0;
        a.onmousewheel = function (e) {
            if (e.deltaY > 0) {
                a.innerHTML = ++b;
            }
             if (e.deltaY < 0) {
                a.innerHTML = --b;
            }
        }
    </script>
</body>

</html>
