<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @keyframes move{
            to{
                transform: translateX(-50%);
            }
        }
        .box1 {
            position: relative;
            display: block;
            width: 300px;
            height: 80px;
            border: 2px solid #000;
            overflow: hidden;
            padding: 3px;
        }

        .box1::before {
            content: ' ';
            width: 200%;
            height: 100%;
            position: absolute;
            top:0;
            left: 0;
            background: linear-gradient(115deg, #fad648, #4fcf70, #12bcfe, red, orange, purple);
            background-size: 50% 100%;
            animation: move .75s linear infinite;
        }
        .box2{
            position: relative;
            display: block;
            width: 100%;
            height: 100%;
            background: #000;
            text-align: center;
            line-height: 77px;
            color: aliceblue;
            font-size: 30px;
        }
    </style>
</head>

<body>
    <a class="box1">
        <span class="box2">开始按钮</span>
    </a>
</body>

</html>
