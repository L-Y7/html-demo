<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            background: url(./img/bg2.png) no-repeat center/cover;
        }

        @keyframes move {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: -13700px 0;
            }
        }

        .box {
            width: 548px;
            height: 513px;
            background-color: aqua;
            margin: 200px;
            background: url(./img/step.png) no-repeat left/13700px 513px;
            animation: move 1s steps(25) infinite;
            
        }
    </style>
</head>

<body>
    <div class="box"> </div>
</body>

</html>
